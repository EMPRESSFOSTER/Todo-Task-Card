<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A clean, modern, accessible Todo Task Card component with priority, status, tags, and time-remaining features."
    />
    <title>Todo Task Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-wrapper">
      <article
        class="todo-card"
        data-testid="test-todo-card"
        aria-label="Task: Launch Design System"
      >
        <!-- ── Card Header ─────────────────────────────── -->
        <header class="card-header">
          <div class="header-top">
            <!-- Completion toggle -->
            <label class="completion-label">
              <input type="checkbox" data-testid="test-todo-complete-toggle" id="todo-complete" />
              <span class="completion-text">Mark as complete</span>
            </label>

            <!-- Title -->
            <h2
              class="todo-title"
              data-testid="test-todo-title"
              id="card-title"
            >
              Launch Design System
            </h2>
          </div>

          <!-- Badges row -->
          <div class="badges-row" role="group" aria-label="Task metadata">
            <span
              class="badge badge--priority badge--high"
              data-testid="test-todo-priority"
              aria-label="Priority: High"
            >
              🔴 High
            </span>

            <span
              class="badge badge--status"
              data-testid="test-todo-status"
              id="todo-status-badge"
              aria-label="Status: In Progress"
            >
              ⚙️ In Progress
            </span>
          </div>
        </header>

        <!-- ── Description ────────────────────────────── -->
        <p
          class="todo-description"
          data-testid="test-todo-description"
          id="card-description"
        >
          Finalise all design tokens, component specs, and export the Figma kit.
          Co-ordinate with engineering to publish the npm package and update the
          internal documentation site with usage examples.
        </p>

        <!-- ── Tags ───────────────────────────────────── -->
        <ul
          class="tags-list"
          data-testid="test-todo-tags"
          role="list"
          aria-label="Task tags"
        >
          <li class="tag" data-testid="test-todo-tag-work" role="listitem">Work</li>
          <li class="tag" data-testid="test-todo-tag-urgent" role="listitem">Urgent</li>
          <li class="tag" data-testid="test-todo-tag-design" role="listitem">Design</li>
        </ul>

        <!-- ── Due Date & Time Remaining ─────────────── -->
        <div class="due-section">
          <div class="due-date-row">
            <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
              <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/>
            </svg>
            <time
              class="due-date"
              data-testid="test-todo-due-date"
              datetime="2026-05-01T18:00:00Z"
              id="due-date-display"
            >
              Due May 1, 2026
            </time>
            <input type="datetime-local" id="edit-date-input" class="date-picker hidden" />
          </div>

          <div
            class="time-remaining"
            data-testid="test-todo-time-remaining"
            aria-live="polite"
            aria-atomic="true"
            id="time-remaining-text"
          >
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- ── Actions ────────────────────────────────── -->
        <footer class="card-footer">
          <button
            class="btn btn--edit"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
            type="button"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
            </svg>
            Edit
          </button>

          <button
            class="btn btn--delete"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
            type="button"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path
                d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M10 11v6M14 11v6"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
            </svg>
            Delete
          </button>
        </footer>
      </article>
    </main>

    <script src="app.js"></script>
  </body>
</html>
